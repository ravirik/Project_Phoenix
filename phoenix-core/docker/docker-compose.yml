version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    container_name: phoenix-nats-bus
    command: "-js -sd /data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_storage:/data

  postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres-primary
    environment:
      POSTGRES_USER: phoenix_admin
      POSTGRES_PASSWORD: secret_vault_pass_2026
      POSTGRES_DB: phoenix_telemetry_state
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix_admin -d phoenix_telemetry_state"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: phoenix-redis-cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_storage:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: phoenix-qdrant-vector
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nats_storage:
  postgres_storage:
  redis_storage:
  qdrant_storage:
