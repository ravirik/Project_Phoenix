services:
  # 1. MESSAGE BROKER
  nats:
    image: nats:2.10-alpine
    container_name: phoenix-nats-bus
    command: "-js -sd /data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_storage:/data

  # 2. STATE & MEMORY DATABASES
  postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phoenix_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_vault_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-phoenix_telemetry_state}
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenix_admin} -d ${POSTGRES_DB:-phoenix_telemetry_state}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: phoenix-redis-cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_storage:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: phoenix-qdrant-vector
    environment:
      - QDRANT_SERVICE_HOST=0.0.0.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 3. AUTONOMOUS AI WORKER
  ai-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: phoenix-ai-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_started
    env_file:
      - ../.env
    environment:
      - NATS_URL=nats://phoenix-nats-bus:4222
      - QDRANT_URL=http://phoenix-qdrant-vector:6333
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-phoenix_admin}:${POSTGRES_PASSWORD:-secret_vault_pass_2026}@phoenix-postgres-primary:5432/${POSTGRES_DB:-phoenix_telemetry_state}
      - REDIS_URL=redis://phoenix-redis-cache:6379/0
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json
      - PYTHONWARNINGS=ignore::DeprecationWarning
      - PYTHONUNBUFFERED=1
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro
      - ../data:/app/data
      - ../models:/app/models

volumes:
  nats_storage:
  postgres_storage:
  redis_storage:
  qdrant_storage: